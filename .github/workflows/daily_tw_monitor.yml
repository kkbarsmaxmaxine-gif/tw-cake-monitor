name: TW Cake Monitor — Daily Run

on:
  # Weekdays at 09:00 UTC = 17:00 TST (3.5 h after Taiwan market close at 13:30)
  schedule:
    - cron: "0 9 * * 1-5"

  # Allow manual trigger from Actions tab
  workflow_dispatch:
    inputs:
      skip_intraday:
        description: "Skip intraday 5m fetch (faster, no rebound metrics)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write   # needed to commit the daily report back to the repo

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4

      # ── 2. Python setup ──────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 3. Run monitor ───────────────────────────────────────────────────────
      - name: Run TW Cake Monitor
        id: monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          DATE=$(date -u +%Y%m%d)
          echo "date=${DATE}" >> "$GITHUB_OUTPUT"

          EXTRA_FLAGS=""
          if [ "${{ github.event.inputs.skip_intraday }}" = "true" ]; then
            EXTRA_FLAGS="--skip-intraday"
          fi

          python main.py --date "$DATE" $EXTRA_FLAGS

      # ── 4. Upload report as workflow artifact ─────────────────────────────────
      - name: Upload report artifact
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: tw-cake-monitor-${{ steps.monitor.outputs.date }}
          path: output/
          retention-days: 30

      # ── 5. Commit report back to repo ────────────────────────────────────────
      - name: Commit daily report to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          DATE=${{ steps.monitor.outputs.date }}

          echo "--- output/ contents ---"
          ls -la output/ || echo "(output/ missing)"
          echo "--- docs/ contents ---"
          ls -la docs/ || echo "(docs/ missing)"
          echo "--- git status ---"
          git status

          git add -A

          echo "--- git status after add ---"
          git status

          if git diff --cached --quiet; then
            echo "Nothing to commit (report unchanged)."
            exit 0
          fi

          git commit -m "chore: daily TW cake monitor report ${DATE}"

          # Retry push up to 3 times; rebase on rejection
          for i in 1 2 3; do
            git push origin main && break
            echo "Push attempt $i rejected — rebasing and retrying…"
            git pull --rebase origin main
          done

      # ── 6. Trigger Netlify redeploy ──────────────────────────────────────────
      - name: Trigger Netlify deploy
        if: ${{ secrets.NETLIFY_BUILD_HOOK != '' }}
        run: |
          curl -s -X POST "${{ secrets.NETLIFY_BUILD_HOOK }}"
          echo "Netlify deploy triggered."
