<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台股板塊輪動</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0f172a;
    color: #e2e8f0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Microsoft JhengHei", sans-serif;
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    padding: 14px 20px;
    border-bottom: 1px solid #1e293b;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .header-logo {
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: #f1f5f9;
  }
  .header-logo span { color: #38bdf8; }
  #date-label {
    font-size: 0.78rem;
    color: #64748b;
    background: #1e293b;
    padding: 3px 9px;
    border-radius: 20px;
  }
  #bm-label {
    font-size: 0.82rem;
    font-weight: 600;
    margin-left: auto;
    padding: 3px 10px;
    border-radius: 6px;
    background: #1e293b;
  }

  /* ── Toolbar (legend + tabs) ── */
  .toolbar {
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 8px 20px;
    border-bottom: 1px solid #1e293b;
    background: #0f172a;
    flex-wrap: wrap;
  }
  .legend {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 0.76rem;
    color: #94a3b8;
  }
  .dot {
    width: 9px; height: 9px;
    border-radius: 50%;
    display: inline-block;
    flex-shrink: 0;
  }
  .dot-漲潮 { background: #10b981; }
  .dot-輪動 { background: #38bdf8; }
  .dot-觀望 { background: #94a3b8; }
  .dot-退潮 { background: #f43f5e; }

  .tabs {
    display: flex;
    gap: 4px;
    margin-left: auto;
  }
  .tab-btn {
    padding: 5px 14px;
    border-radius: 6px;
    font-size: 0.78rem;
    cursor: pointer;
    border: 1px solid #1e293b;
    background: transparent;
    color: #64748b;
    transition: all 0.15s;
  }
  .tab-btn.active {
    background: #1e293b;
    color: #e2e8f0;
    border-color: #334155;
  }
  .tab-btn:hover:not(.active) { color: #94a3b8; }

  /* ── Main layout ── */
  .main {
    display: grid;
    grid-template-columns: 1fr 320px;
    height: calc(100vh - 90px);
  }

  /* ── Bubble chart ── */
  .chart-wrap {
    padding: 16px;
    position: relative;
    overflow: hidden;
  }
  #bubble-chart { width: 100% !important; height: 100% !important; }

  /* ── Leaderboard ── */
  #rank-view {
    padding: 16px;
    overflow-y: auto;
    display: none;
  }
  .rank-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.82rem;
  }
  .rank-table th {
    text-align: left;
    color: #64748b;
    font-weight: 500;
    padding: 6px 10px;
    border-bottom: 1px solid #1e293b;
    white-space: nowrap;
  }
  .rank-table td {
    padding: 10px 10px;
    border-bottom: 1px solid #1e293b;
    vertical-align: middle;
  }
  .rank-table tr:hover td { background: #1e293b; }
  .rank-num {
    color: #64748b;
    font-size: 0.75rem;
    width: 28px;
  }
  .rank-stocks {
    font-size: 0.72rem;
    color: #64748b;
    margin-top: 3px;
  }

  /* ── Side panel ── */
  .panel {
    border-left: 1px solid #1e293b;
    overflow-y: auto;
  }
  .panel-title {
    padding: 10px 14px;
    font-size: 0.72rem;
    color: #64748b;
    text-transform: uppercase;
    letter-spacing: .08em;
    border-bottom: 1px solid #1e293b;
    position: sticky;
    top: 0;
    background: #0f172a;
    z-index: 1;
  }
  .layer-card {
    padding: 11px 14px;
    border-bottom: 1px solid #1e293b;
    background: #0f172a;
    cursor: pointer;
    transition: background 0.12s;
  }
  .layer-card:hover { background: #1e293b; }
  .layer-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 5px;
  }
  .layer-name { font-size: 0.84rem; font-weight: 500; }
  .layer-chg  { font-size: 0.84rem; font-weight: 700; }
  .pos { color: #10b981; }
  .neg { color: #f43f5e; }

  .layer-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }
  .state-badge {
    font-size: 0.66rem;
    padding: 2px 8px;
    border-radius: 20px;
    font-weight: 600;
    letter-spacing: 0.03em;
  }
  .badge-漲潮 { background: rgba(16,185,129,.15);  color: #10b981; }
  .badge-輪動 { background: rgba(56,189,248,.15);  color: #38bdf8; }
  .badge-觀望 { background: rgba(148,163,184,.15); color: #94a3b8; }
  .badge-退潮 { background: rgba(244,63,94,.15);   color: #f43f5e; }

  .vs-label { font-size: 0.72rem; color: #64748b; }
  .buzz-row { font-size: 0.72rem; color: #64748b; margin-top: 4px; }
  .buzz-row .buzz-val { color: #f59e0b; font-weight: 600; }
  .stock-list { display: flex; flex-direction: column; gap: 2px; }
  .stock-row {
    display: flex;
    justify-content: space-between;
    font-size: 0.74rem;
  }
  .stock-name { color: #94a3b8; }

  /* ── Tooltip ── */
  #tooltip {
    position: fixed;
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 10px;
    padding: 11px 14px;
    font-size: 0.78rem;
    pointer-events: none;
    display: none;
    z-index: 999;
    min-width: 190px;
    box-shadow: 0 8px 32px rgba(0,0,0,.5);
  }
  #tooltip h4 { font-size: 0.86rem; margin-bottom: 7px; }
  #tooltip .tt-row {
    display: flex;
    justify-content: space-between;
    gap: 16px;
    color: #64748b;
    margin: 3px 0;
    font-size: 0.76rem;
  }
  #tooltip .tt-row span:last-child { color: #cbd5e1; }
  #tooltip hr { border: none; border-top: 1px solid #334155; margin: 7px 0; }

  /* ── Responsive ── */
  @media (max-width: 720px) {
    .main { grid-template-columns: 1fr; }
    .panel { border-left: none; border-top: 1px solid #1e293b; height: 40vh; }
    .chart-wrap { height: 55vw; min-height: 280px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-logo">🌊 <span>台股</span>板塊輪動</div>
  <span id="date-label">載入中…</span>
  <span id="bm-label"></span>
</header>

<div class="toolbar">
  <div class="legend">
    <span class="legend-item"><i class="dot dot-漲潮"></i>漲潮 — 資金加速流入</span>
    <span class="legend-item"><i class="dot dot-輪動"></i>輪動 — 資金緩步流入</span>
    <span class="legend-item"><i class="dot dot-觀望"></i>觀望 — 資金觀望</span>
    <span class="legend-item"><i class="dot dot-退潮"></i>退潮 — 資金流出</span>
  </div>
  <div class="tabs">
    <button class="tab-btn active" id="btn-bubble" onclick="switchTab('bubble')">泡泡圖</button>
    <button class="tab-btn" id="btn-rank" onclick="switchTab('rank')">排行榜</button>
  </div>
</div>

<div class="main">
  <div class="chart-wrap" id="chart-view">
    <canvas id="bubble-chart"></canvas>
  </div>
  <div id="rank-view"></div>

  <div class="panel">
    <div class="panel-title">各族群排行</div>
    <div id="layer-list"></div>
  </div>
</div>

<div id="tooltip"></div>

<script>
const STATES = {
  漲潮: { bg: 'rgba(16,185,129,0.72)',  border: '#10b981' },
  輪動: { bg: 'rgba(56,189,248,0.72)',  border: '#38bdf8' },
  觀望: { bg: 'rgba(148,163,184,0.55)', border: '#94a3b8' },
  退潮: { bg: 'rgba(244,63,94,0.72)',   border: '#f43f5e' },
};

function getState(vs_bm) {
  if (vs_bm >  1.5) return '漲潮';
  if (vs_bm >  0.0) return '輪動';
  if (vs_bm > -1.5) return '觀望';
  return '退潮';
}

function pct(v) {
  if (v == null || isNaN(v)) return 'N/A';
  return (v > 0 ? '+' : '') + v.toFixed(2) + '%';
}

function switchTab(tab) {
  document.getElementById('chart-view').style.display = tab === 'bubble' ? '' : 'none';
  document.getElementById('rank-view').style.display  = tab === 'rank'   ? '' : 'none';
  document.getElementById('btn-bubble').classList.toggle('active', tab === 'bubble');
  document.getElementById('btn-rank').classList.toggle('active',   tab === 'rank');
}

const t = Date.now();
Promise.all([
  fetch('data.json?t=' + t).then(r => r.json()),
  fetch('social_buzz.json?t=' + t).then(r => r.json()).catch(() => ({})),
]).then(([data, preBuzz]) => {
  if (!data.social_buzz || !(data.social_buzz.sources || []).length) {
    data.social_buzz = preBuzz;
    const byLayer = (preBuzz.by_layer) || {};
    (data.layers || []).forEach(layer => {
      const lb = byLayer[layer.layer_id] || {};
      layer.buzz_total = lb.total || 0;
      layer.buzz_top   = lb.top_ticker || '';
    });
  }

  document.getElementById('date-label').textContent = data.date || '';
    const bm   = data.benchmark_chg;
    const bmEl = document.getElementById('bm-label');
    if (bm != null) {
      bmEl.textContent = '加權指數 ' + pct(bm);
      bmEl.style.color = bm >= 0 ? '#10b981' : '#f43f5e';
    }

    const layers = data.layers || [];

    // ── Bubble chart ─────────────────────────────────────────────────────────
    const datasets = layers.map(layer => {
      const vs    = bm != null ? (layer.avg_change - bm) : layer.avg_change;
      const state = getState(vs);
      const col   = STATES[state];
      const r     = Math.max(10, Math.min(38, (layer.avg_vol_ratio || 1) * 16));
      return {
        label:           layer.label,
        data:            [{ x: layer.avg_change, y: vs, r }],
        backgroundColor: col.bg,
        borderColor:     col.border,
        borderWidth:     2,
        _meta:  layer,
        _state: state,
      };
    });

    const ctx   = document.getElementById('bubble-chart').getContext('2d');
    const chart = new Chart(ctx, {
      type: 'bubble',
      data: { datasets },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: { duration: 500 },
        plugins: {
          legend:  { display: false },
          tooltip: { enabled: false },
        },
        scales: {
          x: {
            title: { display: true, text: '今日漲跌 %', color: '#64748b', font: { size: 11 } },
            grid:  { color: '#1e293b' },
            ticks: { color: '#64748b', font: { size: 10 }, callback: v => v.toFixed(1) + '%' },
          },
          y: {
            title: { display: true, text: '相對加權指數 (%)', color: '#64748b', font: { size: 11 } },
            grid:  { color: '#1e293b', lineWidth: c => c.tick.value === 0 ? 2 : 1 },
            ticks: { color: '#64748b', font: { size: 10 }, callback: v => (v > 0 ? '+' : '') + v.toFixed(1) + '%' },
          },
        },
      },
    });

    // Custom tooltip
    const tooltip = document.getElementById('tooltip');
    const canvas  = document.getElementById('bubble-chart');
    canvas.addEventListener('mousemove', e => {
      const pts = chart.getElementsAtEventForMode(e, 'nearest', { intersect: true }, false);
      if (!pts.length) { tooltip.style.display = 'none'; return; }
      const ds  = chart.data.datasets[pts[0].datasetIndex];
      const lay = ds._meta;
      const vs  = bm != null ? (lay.avg_change - bm) : lay.avg_change;
      const st  = getState(vs);
      const col = STATES[st].border;

      let html = `<h4 style="color:${col}">${lay.label}</h4>`;
      html += `<div class="tt-row"><span>今日漲跌</span><span>${pct(lay.avg_change)}</span></div>`;
      html += `<div class="tt-row"><span>vs 加權指數</span><span>${pct(vs)}</span></div>`;
      html += `<div class="tt-row"><span>Vol 倍率</span><span>${(lay.avg_vol_ratio || 0).toFixed(2)}x</span></div>`;
      if (lay.top_stocks && lay.top_stocks.length) {
        html += '<hr>';
        lay.top_stocks.forEach(s => {
          const sc = s.change_pct >= 0 ? '#10b981' : '#f43f5e';
          html += `<div class="tt-row"><span>${s.display_name}</span><span style="color:${sc}">${pct(s.change_pct)}</span></div>`;
        });
      }
      tooltip.innerHTML      = html;
      tooltip.style.display  = 'block';
      tooltip.style.left     = (e.clientX + 14) + 'px';
      tooltip.style.top      = (e.clientY - 10) + 'px';
    });
    canvas.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; });

    // ── Leaderboard ───────────────────────────────────────────────────────────
    const sorted = [...layers].sort((a, b) => b.avg_change - a.avg_change);
    const rankDiv = document.getElementById('rank-view');
    let tbl = `<table class="rank-table"><thead><tr>
      <th>#</th><th>族群</th><th>狀態</th><th>今日漲跌</th><th>vs 大盤</th><th>Vol倍率</th>
    </tr></thead><tbody>`;
    sorted.forEach((layer, i) => {
      const vs     = bm != null ? (layer.avg_change - bm) : layer.avg_change;
      const state  = getState(vs);
      const chgCls = layer.avg_change >= 0 ? 'pos' : 'neg';
      const vsCls  = vs >= 0 ? 'pos' : 'neg';
      const stocks = (layer.top_stocks || []).map(s => {
        const sc = s.change_pct >= 0 ? '#10b981' : '#f43f5e';
        return `<span style="color:${sc}">${s.display_name} ${pct(s.change_pct)}</span>`;
      }).join('&ensp;');
      tbl += `<tr>
        <td class="rank-num">${i + 1}</td>
        <td>
          <div>${layer.label}</div>
          ${stocks ? `<div class="rank-stocks">${stocks}</div>` : ''}
        </td>
        <td><span class="state-badge badge-${state}">${state}</span></td>
        <td class="${chgCls}" style="font-weight:600">${pct(layer.avg_change)}</td>
        <td class="${vsCls}">${pct(vs)}</td>
        <td style="color:#64748b">${(layer.avg_vol_ratio || 0).toFixed(2)}x</td>
      </tr>`;
    });
    tbl += '</tbody></table>';
    rankDiv.innerHTML = tbl;

    // ── Side panel ────────────────────────────────────────────────────────────
    const list = document.getElementById('layer-list');
    sorted.forEach(layer => {
      const vs     = bm != null ? (layer.avg_change - bm) : layer.avg_change;
      const state  = getState(vs);
      const chgCls = layer.avg_change >= 0 ? 'pos' : 'neg';
      const vsCls  = vs >= 0 ? 'pos' : 'neg';

      const buzzTotal = layer.buzz_total || 0;
      const buzzHtml  = buzzTotal > 0
        ? `<div class="buzz-row">🔥 <span class="buzz-val">${buzzTotal}</span> 則討論${layer.buzz_top ? '  ·  ' + layer.buzz_top : ''}</div>`
        : '';

      const card = document.createElement('div');
      card.className = 'layer-card';
      card.innerHTML = `
        <div class="layer-card-header">
          <span class="layer-name">${layer.label}</span>
          <span class="layer-chg ${chgCls}">${pct(layer.avg_change)}</span>
        </div>
        <div class="layer-meta">
          <span class="state-badge badge-${state}">${state}</span>
          <span class="vs-label ${vsCls}">vs大盤 ${pct(vs)}</span>
        </div>
        ${buzzHtml}
        <div class="stock-list">
          ${(layer.top_stocks || []).map(s => {
            const sc = s.change_pct >= 0 ? '#10b981' : '#f43f5e';
            return `<div class="stock-row">
              <span class="stock-name">${s.display_name}</span>
              <span style="color:${sc};font-weight:600">${pct(s.change_pct)}</span>
            </div>`;
          }).join('')}
        </div>`;
      list.appendChild(card);
    });
}).catch(err => {
  document.getElementById('date-label').textContent = '資料載入失敗: ' + err.message;
});
</script>
</body>
</html>
