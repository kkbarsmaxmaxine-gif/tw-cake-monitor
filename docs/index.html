<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 五層蛋糕 輪動監控</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0d1117;
    color: #e6edf3;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    min-height: 100vh;
  }

  header {
    padding: 18px 24px 12px;
    border-bottom: 1px solid #21262d;
    display: flex;
    align-items: baseline;
    gap: 16px;
  }
  header h1 { font-size: 1.15rem; font-weight: 600; }
  #date-label { font-size: 0.82rem; color: #8b949e; }
  #bm-label   { font-size: 0.82rem; margin-left: auto; }

  .state-legend {
    display: flex;
    gap: 16px;
    padding: 10px 24px;
    border-bottom: 1px solid #21262d;
    font-size: 0.78rem;
  }
  .state-legend span { display: flex; align-items: center; gap: 5px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
  .dot-leading   { background: #3fb950; }
  .dot-rotating  { background: #e3b341; }
  .dot-watching  { background: #8b949e; }
  .dot-receding  { background: #f85149; }

  .main {
    display: grid;
    grid-template-columns: 1fr 340px;
    gap: 0;
    height: calc(100vh - 90px);
  }

  .chart-wrap {
    padding: 16px 20px;
    position: relative;
  }
  #bubble-chart { width: 100% !important; height: 100% !important; }

  .panel {
    border-left: 1px solid #21262d;
    overflow-y: auto;
    padding: 0;
  }

  .panel-title {
    padding: 12px 16px;
    font-size: 0.78rem;
    color: #8b949e;
    text-transform: uppercase;
    letter-spacing: .06em;
    border-bottom: 1px solid #21262d;
    position: sticky;
    top: 0;
    background: #0d1117;
  }

  .layer-card {
    padding: 12px 16px;
    border-bottom: 1px solid #161b22;
    cursor: pointer;
    transition: background 0.15s;
  }
  .layer-card:hover { background: #161b22; }

  .layer-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 6px;
  }
  .layer-name { font-size: 0.88rem; font-weight: 500; }
  .layer-chg  { font-size: 0.88rem; font-weight: 600; }
  .pos { color: #3fb950; }
  .neg { color: #f85149; }

  .state-badge {
    font-size: 0.68rem;
    padding: 2px 7px;
    border-radius: 10px;
    font-weight: 500;
  }
  .badge-leading  { background: rgba(63,185,80,.18);  color: #3fb950; }
  .badge-rotating { background: rgba(227,179,65,.18); color: #e3b341; }
  .badge-watching { background: rgba(139,148,158,.18);color: #8b949e; }
  .badge-receding { background: rgba(248,81,73,.18);  color: #f85149; }

  .stock-list { display: flex; flex-direction: column; gap: 3px; }
  .stock-row  {
    display: flex;
    justify-content: space-between;
    font-size: 0.78rem;
    color: #8b949e;
  }
  .stock-row .ticker { color: #c9d1d9; }

  /* tooltip */
  #tooltip {
    position: fixed;
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 0.8rem;
    pointer-events: none;
    display: none;
    z-index: 999;
    min-width: 180px;
    box-shadow: 0 4px 20px rgba(0,0,0,.5);
  }
  #tooltip h4 { font-size: 0.85rem; margin-bottom: 6px; }
  #tooltip .tt-row {
    display: flex;
    justify-content: space-between;
    gap: 16px;
    color: #8b949e;
    margin: 2px 0;
  }
  #tooltip .tt-row span:last-child { color: #c9d1d9; }

  @media (max-width: 700px) {
    .main { grid-template-columns: 1fr; }
    .panel { border-left: none; border-top: 1px solid #21262d; height: auto; }
    .chart-wrap { height: 60vw; min-height: 300px; }
  }
</style>
</head>
<body>

<header>
  <h1>🎂 AI 五層蛋糕 輪動監控</h1>
  <span id="date-label">載入中…</span>
  <span id="bm-label"></span>
</header>

<div class="state-legend">
  <span><i class="dot dot-leading"></i>主力 — 跑贏大盤</span>
  <span><i class="dot dot-rotating"></i>輪動 — 小幅跑贏</span>
  <span><i class="dot dot-watching"></i>觀望 — 持平大盤</span>
  <span><i class="dot dot-receding"></i>退潮 — 跑輸大盤</span>
</div>

<div class="main">
  <div class="chart-wrap">
    <canvas id="bubble-chart"></canvas>
  </div>
  <div class="panel">
    <div class="panel-title">各層排行</div>
    <div id="layer-list"></div>
  </div>
</div>

<div id="tooltip"></div>

<script>
const STATE_COLORS = {
  leading:  { bg: 'rgba(63,185,80,0.75)',   border: '#3fb950' },
  rotating: { bg: 'rgba(227,179,65,0.75)',  border: '#e3b341' },
  watching: { bg: 'rgba(139,148,158,0.65)', border: '#8b949e' },
  receding: { bg: 'rgba(248,81,73,0.75)',   border: '#f85149' },
};
const STATE_LABEL = { leading:'主力', rotating:'輪動', watching:'觀望', receding:'退潮' };

function pct(v) {
  if (v == null || isNaN(v)) return 'N/A';
  return (v > 0 ? '+' : '') + v.toFixed(2) + '%';
}

function getState(vs_sp) {
  if (vs_sp >  1.5) return 'leading';
  if (vs_sp >  0.0) return 'rotating';
  if (vs_sp > -1.5) return 'watching';
  return 'receding';
}

fetch('data.json?t=' + Date.now())
  .then(r => r.json())
  .then(data => {
    document.getElementById('date-label').textContent = data.date || '';
    const bm = data.benchmark_chg;
    const bmEl = document.getElementById('bm-label');
    if (bm != null) {
      bmEl.textContent = 'S&P500 ' + pct(bm);
      bmEl.style.color = bm >= 0 ? '#3fb950' : '#f85149';
    }

    const layers = data.layers || [];

    // ── Bubble chart ──────────────────────────────────────────────────────
    const datasets = layers.map(layer => {
      const vs_sp = bm != null ? (layer.avg_change - bm) : layer.avg_change;
      const state = getState(vs_sp);
      const col   = STATE_COLORS[state];
      const r     = Math.max(10, Math.min(38, (layer.avg_vol_ratio || 1) * 16));
      return {
        label:           layer.label,
        data: [{ x: layer.avg_change, y: vs_sp, r }],
        backgroundColor: col.bg,
        borderColor:     col.border,
        borderWidth:     2,
        _meta: layer,
        _state: state,
      };
    });

    const ctx = document.getElementById('bubble-chart').getContext('2d');
    const chart = new Chart(ctx, {
      type: 'bubble',
      data: { datasets },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: { duration: 600 },
        plugins: {
          legend: { display: false },
          tooltip: { enabled: false },
        },
        scales: {
          x: {
            title: { display: true, text: '今日漲跌 %', color: '#8b949e', font: { size: 11 } },
            grid:  { color: '#21262d' },
            ticks: { color: '#8b949e', font: { size: 10 },
                     callback: v => v.toFixed(1) + '%' },
          },
          y: {
            title: { display: true, text: '相對 S&P500 (%)', color: '#8b949e', font: { size: 11 } },
            grid:  { color: '#21262d',
                     lineWidth: ctx2 => ctx2.tick.value === 0 ? 2 : 1 },
            ticks: { color: '#8b949e', font: { size: 10 },
                     callback: v => (v > 0 ? '+' : '') + v.toFixed(1) + '%' },
          },
        },
      },
    });

    // custom hover tooltip
    const tooltip = document.getElementById('tooltip');
    document.getElementById('bubble-chart').addEventListener('mousemove', e => {
      const pts = chart.getElementsAtEventForMode(e, 'nearest', { intersect: true }, false);
      if (!pts.length) { tooltip.style.display = 'none'; return; }
      const ds  = chart.data.datasets[pts[0].datasetIndex];
      const lay = ds._meta;
      const vs  = bm != null ? (lay.avg_change - bm) : lay.avg_change;
      const st  = getState(vs);
      const col = STATE_COLORS[st].border;

      let html = `<h4 style="color:${col}">${lay.label}</h4>`;
      html += `<div class="tt-row"><span>今日</span><span>${pct(lay.avg_change)}</span></div>`;
      html += `<div class="tt-row"><span>vs S&P</span><span>${pct(vs)}</span></div>`;
      html += `<div class="tt-row"><span>Vol倍率</span><span>${(lay.avg_vol_ratio||0).toFixed(2)}x</span></div>`;
      if (lay.top_stocks && lay.top_stocks.length) {
        html += `<hr style="border-color:#30363d;margin:6px 0">`;
        lay.top_stocks.forEach(s => {
          const sc = s.change_pct >= 0 ? '#3fb950' : '#f85149';
          html += `<div class="tt-row"><span class="ticker">${s.display_name}</span>`
                + `<span style="color:${sc}">${pct(s.change_pct)}</span></div>`;
        });
      }
      tooltip.innerHTML = html;
      tooltip.style.display = 'block';
      tooltip.style.left = (e.clientX + 14) + 'px';
      tooltip.style.top  = (e.clientY - 10) + 'px';
    });
    document.getElementById('bubble-chart').addEventListener('mouseleave', () => {
      tooltip.style.display = 'none';
    });

    // ── Side panel ────────────────────────────────────────────────────────
    const list = document.getElementById('layer-list');
    const sorted = [...layers].sort((a, b) => b.avg_change - a.avg_change);
    sorted.forEach(layer => {
      const vs    = bm != null ? (layer.avg_change - bm) : layer.avg_change;
      const state = getState(vs);
      const chgCls = layer.avg_change >= 0 ? 'pos' : 'neg';

      const card = document.createElement('div');
      card.className = 'layer-card';
      card.innerHTML = `
        <div class="layer-card-header">
          <span class="layer-name">${layer.label}</span>
          <span class="layer-chg ${chgCls}">${pct(layer.avg_change)}</span>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
          <span class="state-badge badge-${state}">${STATE_LABEL[state]}</span>
          <span style="font-size:.75rem;color:#8b949e">vs S&P ${pct(vs)}</span>
        </div>
        <div class="stock-list">
          ${(layer.top_stocks || []).map(s => {
            const sc = s.change_pct >= 0 ? '#3fb950' : '#f85149';
            return `<div class="stock-row">
              <span class="ticker">${s.display_name}</span>
              <span style="color:${sc}">${pct(s.change_pct)}</span>
            </div>`;
          }).join('')}
        </div>`;
      list.appendChild(card);
    });
  })
  .catch(err => {
    document.getElementById('date-label').textContent = '資料載入失敗: ' + err.message;
  });
</script>
</body>
</html>
